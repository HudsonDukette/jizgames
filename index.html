<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Bubble Arcade - Retro Web Games</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700;800&family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        h1 {
            font-family: 'Baloo 2', sans-serif;
            font-size: 4rem;
            margin-bottom: 10px;
            animation: bounce 1s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .subtitle {
            font-size: 1.2rem;
            opacity: 0.95;
        }

        .search-container {
            margin: 30px auto;
            max-width: 500px;
        }

        .search-input {
            width: 100%;
            padding: 15px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            font-family: 'Fredoka', sans-serif;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            transform: scale(1.05);
            box-shadow: 0 12px 30px rgba(0,0,0,0.3);
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            padding: 20px 0;
        }

        .game-card {
            background: white;
            border-radius: 30px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            cursor: pointer;
            transform-origin: center;
            position: relative;
            overflow: hidden;
        }

        .game-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        .game-card:hover::before {
            left: 100%;
        }

        .game-card:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
        }

        .game-card .emoji {
            font-size: 3.5rem;
            text-align: center;
            margin-bottom: 10px;
        }

        .game-card h3 {
            font-family: 'Baloo 2', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: #333;
        }

        .game-card p {
            font-size: 0.95rem;
            color: #666;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .play-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 1.1rem;
            font-family: 'Baloo 2', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .play-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .play-btn:active {
            transform: scale(0.95);
        }

        .no-games {
            text-align: center;
            padding: 60px 20px;
            color: white;
            font-size: 1.3rem;
        }

        footer {
            text-align: center;
            padding: 40px 20px;
            color: white;
            opacity: 0.9;
            margin-top: 40px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }

            .games-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 15px;
            }

            .game-card {
                padding: 15px;
            }

            .game-card .emoji {
                font-size: 2.5rem;
            }

            .game-card h3 {
                font-size: 1.2rem;
            }

            .game-card p {
                font-size: 0.85rem;
            }
        }
    </style>
    <style>
        :root{
            --bg: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%);
            --card-bg: #ffffff;
            --text: #333333;
            --muted: #666666;
            --accent: #667eea;
            --card-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        html[data-theme="dark"]{
            --bg: linear-gradient(135deg, #0f1724 0%, #071024 100%);
            --card-bg: #0b1220;
            --text: #e6eef9;
            --muted: #9aa7b9;
            --accent: #7dd3fc;
            --card-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        body{ background: var(--bg); color: var(--text); transition: background 0.3s ease, color 0.3s ease; }
        .container, .game-card{ background: var(--card-bg); color: var(--text); box-shadow: var(--card-shadow); }
        .game-card h3{ color: var(--text); }
        .game-card p{ color: var(--muted); }
        header{ color: var(--text); text-shadow: none; }
        .theme-toggle{ position: fixed; right: 16px; top: 16px; z-index:9999; background: var(--card-bg); color: var(--text); border: none; padding: 8px 10px; border-radius: 999px; box-shadow: var(--card-shadow); cursor: pointer; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 Bubble Arcade</h1>
            <p class="subtitle">Play amazing web games right now!</p>
        </header>

        <div class="search-container">
            <input 
                type="text" 
                class="search-input" 
                id="searchInput" 
                placeholder="🔍 Search games..."
            >
        </div>

        <div class="games-grid" id="gamesGrid">
            <!-- Games will be loaded here -->
        </div>

        <div id="noGames" class="no-games" style="display: none;">
            No games found. Try a different search!
        </div>

        <footer>
            <p>Made with 💜 | All games are free to play!</p>
        </footer>
    </div>

    <script>
        const games = [
            {
                id: 'clicker-game',
                title: 'Cookie Clicker',
                emoji: '🍪',
                description: 'Click to earn cookies! Simple but addictive.',
                url: 'games/clicker-game/index.html'
            },
            {
                id: 'snake-game',
                title: 'Snake Master',
                emoji: '🐍',
                description: 'Classic snake game. Eat and grow!',
                url: 'games/snake-game/index.html'
            },
            {
                id: 'pong-game',
                title: 'Pong Battle',
                emoji: '🏓',
                description: 'Legendary Pong. Challenge the AI!',
                url: 'games/pong-game/index.html'
            },
            {
                id: 'memory-game',
                title: 'Memory Match',
                emoji: '🧠',
                description: 'Match pairs. Train your memory!',
                url: 'games/memory-game/index.html'
            },
            {
                id: 'reaction-time-game',
                title: 'Speed Test',
                emoji: '⚡',
                description: 'Test your reaction speed!',
                url: 'games/reaction-time-game/index.html'
            },
            {
                id: 'tic-tac-toe',
                title: 'Tic Tac Toe',
                emoji: '⭕',
                description: 'Classic strategy game vs AI.',
                url: 'games/tic-tac-toe/index.html'
            },
            {
                id: 'rock-paper-scissors',
                title: 'RPS Challenge',
                emoji: '✂️',
                description: 'Rock, Paper, Scissors vs AI!',
                url: 'games/rock-paper-scissors/index.html'
            },
            {
                id: 'flappy-style-game',
                title: 'Flappy Bird',
                emoji: '🐦',
                description: 'Navigate through pipes. Stay alive!',
                url: 'games/flappy-style-game/index.html'
            },
            {
                id: 'maze-game',
                title: 'Maze Runner',
                emoji: '🌀',
                description: 'Find your way through the maze!',
                url: 'games/maze-game/index.html'
            },
            {
                id: 'breakout-game',
                title: 'Brick Breaker',
                emoji: '🧱',
                description: 'Break bricks with a bouncing ball!',
                url: 'games/breakout-game/index.html'
            },
            {
                id: 'idle-clicker-v2',
                title: 'Idle Empire',
                emoji: '👑',
                description: 'Build your empire. Passive income glory!',
                url: 'games/idle-clicker-v2/index.html'
            },
            {
                id: '2048-game',
                title: '2048',
                emoji: '🔢',
                description: 'Merge tiles to reach 2048!',
                url: 'games/2048-game/index.html'
            }
        ];

        const gamesGrid = document.getElementById('gamesGrid');
        const searchInput = document.getElementById('searchInput');
        const noGames = document.getElementById('noGames');

        function renderGames(filtered = games) {
            gamesGrid.innerHTML = '';
            
            if (filtered.length === 0) {
                noGames.style.display = 'block';
                return;
            }
            
            noGames.style.display = 'none';
            filtered.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.innerHTML = `
                    <div class="emoji">${game.emoji}</div>
                    <h3>${game.title}</h3>
                    <p>${game.description}</p>
                    <button class="play-btn" onclick="window.location.href='${game.url}'">Play Now</button>
                `;
                gamesGrid.appendChild(card);
            });
        }

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = games.filter(game => 
                game.title.toLowerCase().includes(query) || 
                game.description.toLowerCase().includes(query)
            );
            renderGames(filtered);
        });

        // Initial render
        renderGames();

        // Play sound effect
        function playBeep(frequency = 800, duration = 100) {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = frequency;
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration / 1000);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + duration / 1000);
        }

                // Add click sound to buttons
                document.addEventListener('click', (e) => {
                        if (e.target.classList.contains('play-btn')) {
                                playBeep(1000, 50);
                        }
                });
        </script>

        <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">🌙</button>
        <script>
        (function(){
            const toggle = document.getElementById('themeToggle');
            const saved = localStorage.getItem('theme');
            const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            const initial = saved || (prefersDark ? 'dark' : 'light');
            setTheme(initial);

            function setTheme(t){
                if(t === 'dark') document.documentElement.setAttribute('data-theme','dark');
                else document.documentElement.removeAttribute('data-theme');
                toggle.textContent = t === 'dark' ? '☀️' : '🌙';
            }

            toggle.addEventListener('click', () => {
                const current = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
                const next = current === 'dark' ? 'light' : 'dark';
                setTheme(next);
                localStorage.setItem('theme', next);
                try { (new (window.AudioContext || window.webkitAudioContext)()).resume(); } catch(e) {}
            });

            if(!saved && window.matchMedia){
                window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
                    const newPref = e.matches ? 'dark' : 'light';
                    const hasSaved = localStorage.getItem('theme');
                    if(!hasSaved) setTheme(newPref);
                });
            }
        })();
        </script>
</body>
</html>
