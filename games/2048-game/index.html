<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 - Bubble Arcade</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700;800&family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 30px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }

        h1 {
            font-family: 'Baloo 2', sans-serif;
            font-size: 2.5rem;
            color: #333;
            margin-bottom: 15px;
        }

        .info {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            font-size: 1rem;
        }

        .info-item {
            color: #666;
        }

        .info-value {
            display: block;
            font-size: 1.8rem;
            color: #667eea;
            font-weight: 700;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            background: #BBADA0;
            padding: 10px;
            border-radius: 10px;
            margin: 20px 0;
        }

        .tile {
            width: 100%;
            aspect-ratio: 1;
            background: #CDC1B4;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 2rem;
            color: #776E65;
            font-family: 'Baloo 2', sans-serif;
        }

        .tile.tile-2 { background: #EEE4DA; color: #776E65; }
        .tile.tile-4 { background: #EDE0C8; color: #776E65; }
        .tile.tile-8 { background: #F2B179; color: #F9F6F2; }
        .tile.tile-16 { background: #F59563; color: #F9F6F2; }
        .tile.tile-32 { background: #F67C5F; color: #F9F6F2; }
        .tile.tile-64 { background: #F65E3B; color: #F9F6F2; }
        .tile.tile-128 { background: #EDCF72; font-size: 1.8rem; color: #776E65; }
        .tile.tile-256 { background: #EDCC61; font-size: 1.8rem; color: #776E65; }
        .tile.tile-512 { background: #EDC850; font-size: 1.8rem; color: #776E65; }
        .tile.tile-1024 { background: #EDC53F; font-size: 1.5rem; color: #776E65; }
        .tile.tile-2048 { background: #EDC22E; font-size: 1.5rem; color: #776E65; }

        .status {
            font-size: 1.1rem;
            color: #666;
            margin: 15px 0;
            min-height: 30px;
        }

        .instructions {
            font-size: 0.9rem;
            color: #999;
            margin: 10px 0;
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px;
            font-size: 1rem;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .restart-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .back-btn {
            background: #ddd;
            color: #333;
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.8rem;
            }

            .tile {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔢 2048</h1>
        
        <div class="info">
            <div class="info-item">
                Score
                <span class="info-value" id="score">0</span>
            </div>
            <div class="info-item">
                Best
                <span class="info-value" id="best">0</span>
            </div>
        </div>

        <div class="board" id="board"></div>

        <div class="instructions">Use arrow keys to move tiles</div>
        <div class="status" id="status">Join the tiles to create 2048!</div>

        <div class="buttons">
            <button class="restart-btn" onclick="newGame()">New Game</button>
            <button class="back-btn" onclick="window.history.back()">Back</button>
        </div>
    </div>

    <script>
        let board = [];
        let score = 0;
        let best = localStorage.getItem('2048Best') ? parseInt(localStorage.getItem('2048Best')) : 0;
        let gameOver = false;
        let won = false;

        const scoreDisplay = document.getElementById('score');
        const bestDisplay = document.getElementById('best');
        const statusDisplay = document.getElementById('status');

        bestDisplay.textContent = best;

        function newGame() {
            board = Array(4).fill().map(() => Array(4).fill(0));
            score = 0;
            gameOver = false;
            won = false;
            scoreDisplay.textContent = score;
            statusDisplay.textContent = 'Join the tiles to create 2048!';
            addNewTile();
            addNewTile();
            render();
        }

        function playBeep(frequency = 800) {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                osc.connect(gain);
                gain.connect(audioContext.destination);
                osc.frequency.value = frequency;
                gain.gain.setValueAtTime(0.3, audioContext.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.05);
                osc.start(audioContext.currentTime);
                osc.stop(audioContext.currentTime + 0.05);
            } catch (e) {}
        }

        function addNewTile() {
            const empty = [];
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (board[i][j] === 0) empty.push({i, j});
                }
            }
            if (empty.length > 0) {
                const {i, j} = empty[Math.floor(Math.random() * empty.length)];
                board[i][j] = Math.random() < 0.9 ? 2 : 4;
            }
        }

        function move(direction) {
            if (gameOver) return;

            const boardBefore = JSON.stringify(board);

            if (direction === 'left' || direction === 'right') {
                for (let i = 0; i < 4; i++) {
                    if (direction === 'right') board[i].reverse();
                    compressRow(board[i]);
                    mergeRow(board[i]);
                    compressRow(board[i]);
                    if (direction === 'right') board[i].reverse();
                }
            } else {
                for (let j = 0; j < 4; j++) {
                    const column = [board[0][j], board[1][j], board[2][j], board[3][j]];
                    if (direction === 'down') column.reverse();
                    compressRow(column);
                    mergeRow(column);
                    compressRow(column);
                    if (direction === 'down') column.reverse();
                    for (let i = 0; i < 4; i++) board[i][j] = column[i];
                }
            }

            if (boardBefore !== JSON.stringify(board)) {
                addNewTile();
                playBeep(800);
            }

            checkGame();
            render();
        }

        function compressRow(row) {
            for (let i = 0; i < 3; i++) {
                if (row[i] === 0) {
                    row.splice(i, 1);
                    row.push(0);
                    i--;
                }
            }
        }

        function mergeRow(row) {
            for (let i = 0; i < 3; i++) {
                if (row[i] === row[i + 1] && row[i] !== 0) {
                    row[i] *= 2;
                    score += row[i];
                    scoreDisplay.textContent = score;
                    row.splice(i + 1, 1);
                    row.push(0);
                    playBeep(1000);
                }
            }
        }

        function checkGame() {
            // Check for 2048
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (board[i][j] === 2048 && !won) {
                        won = true;
                        statusDisplay.textContent = '🎉 You reached 2048!';
                        playBeep(1200);
                    }
                }
            }

            // Check for game over
            let canMove = false;
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    if (board[i][j] === 0) canMove = true;
                    if (j < 3 && board[i][j] === board[i][j + 1]) canMove = true;
                    if (i < 3 && board[i][j] === board[i + 1][j]) canMove = true;
                }
            }

            if (!canMove) {
                gameOver = true;
                if (score > best) {
                    best = score;
                    localStorage.setItem('2048Best', best);
                    bestDisplay.textContent = best;
                    statusDisplay.textContent = '💪 New High Score!';
                } else {
                    statusDisplay.textContent = '💀 Game Over!';
                }
                playBeep(400);
            }
        }

        function render() {
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            for (let i = 0; i < 4; i++) {
                for (let j = 0; j < 4; j++) {
                    const tile = document.createElement('div');
                    tile.className = `tile ${board[i][j] > 0 ? 'tile-' + board[i][j] : ''}`;
                    tile.textContent = board[i][j] || '';
                    boardEl.appendChild(tile);
                }
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') { e.preventDefault(); move('left'); }
            if (e.key === 'ArrowRight') { e.preventDefault(); move('right'); }
            if (e.key === 'ArrowUp') { e.preventDefault(); move('up'); }
            if (e.key === 'ArrowDown') { e.preventDefault(); move('down'); }
        });

        newGame();
    </script>
</body>
</html>
