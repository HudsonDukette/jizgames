<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maze Runner - Bubble Arcade</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700;800&family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 30px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }

        h1 {
            font-family: 'Baloo 2', sans-serif;
            font-size: 2rem;
            color: #333;
            margin-bottom: 15px;
        }

        .status {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 20px;
        }

        #gameCanvas {
            display: block;
            border: 4px solid #667eea;
            border-radius: 15px;
            background: #f5f5f5;
            margin: 20px auto;
            max-width: 100%;
        }

        .instructions {
            color: #666;
            font-size: 0.95rem;
            margin: 15px 0;
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px;
            font-size: 1rem;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .restart-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .back-btn {
            background: #ddd;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌀 Maze Runner</h1>
        
        <div class="status" id="status">Reach the exit! 🎯</div>

        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div class="instructions">
            Use arrow keys or WASD to move the player to the exit
        </div>

        <div class="buttons">
            <button class="restart-btn" onclick="location.reload()">Restart</button>
            <button class="back-btn" onclick="window.history.back()">Back</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const statusDisplay = document.getElementById('status');

        const maze = [
            "##################",
            "#P      #        E#",
            "# ##### # ###### #",
            "# #     # #      #",
            "# # ### # # #### #",
            "#   #   #   #    #",
            "### # # ### # ## ##",
            "#   # #   # #  # #",
            "# # # ### # ## # #",
            "# # #     #    # #",
            "# # #########   #",
            "#   #        ## #",
            "################ #",
            "#              # #",
            "# ############ # #",
            "#              # #",
            "##################"
        ];

        const cellSize = 20;
        let playerX = 1;
        let playerY = 1;
        let gameWon = false;

        const keyState = {};

        document.addEventListener('keydown', (e) => {
            keyState[e.key.toLowerCase()] = true;
        });

        document.addEventListener('keyup', (e) => {
            keyState[e.key.toLowerCase()] = false;
        });

        function checkCollision(x, y) {
            if (y >= 0 && y < maze.length && x >= 0 && x < maze[y].length) {
                return maze[y][x] !== '#';
            }
            return false;
        }

        function update() {
            if (gameWon) return;

            if ((keyState['arrowup'] || keyState['w']) && checkCollision(playerX, playerY - 1)) {
                playerY--;
            }
            if ((keyState['arrowdown'] || keyState['s']) && checkCollision(playerX, playerY + 1)) {
                playerY++;
            }
            if ((keyState['arrowleft'] || keyState['a']) && checkCollision(playerX - 1, playerY)) {
                playerX--;
            }
            if ((keyState['arrowright'] || keyState['d']) && checkCollision(playerX + 1, playerY)) {
                playerX++;
            }

            if (maze[playerY][playerX] === 'E') {
                gameWon = true;
                statusDisplay.textContent = '🎉 You reached the exit! You win!';
                playBeep(1200);
            }
        }

        function draw() {
            ctx.fillStyle = '#f5f5f5';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let y = 0; y < maze.length; y++) {
                for (let x = 0; x < maze[y].length; x++) {
                    if (maze[y][x] === '#') {
                        ctx.fillStyle = '#667eea';
                        ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
                    } else if (maze[y][x] === 'E') {
                        ctx.fillStyle = '#FFD700';
                        ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
                        ctx.fillStyle = '#333';
                        ctx.font = '14px Arial';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText('E', x * cellSize + cellSize / 2, y * cellSize + cellSize / 2);
                    }
                }
            }

            ctx.fillStyle = '#FF6B6B';
            ctx.fillRect(playerX * cellSize, playerY * cellSize, cellSize, cellSize);
            ctx.fillStyle = '#FFF';
            ctx.font = '12px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('P', playerX * cellSize + cellSize / 2, playerY * cellSize + cellSize / 2);
        }

        function playBeep(frequency = 800) {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                osc.connect(gain);
                gain.connect(audioContext.destination);
                osc.frequency.value = frequency;
                gain.gain.setValueAtTime(0.3, audioContext.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                osc.start(audioContext.currentTime);
                osc.stop(audioContext.currentTime + 0.1);
            } catch (e) {}
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
